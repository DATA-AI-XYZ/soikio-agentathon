<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">soikio-agentathon Azure resource architecture</title>
  <desc id="d">Four agents in Microsoft Foundry Agent Service, powered by Claude (Anthropic), query a Foundry IQ knowledge base. The knowledge base runs on Azure AI Search, which indexes and retrieves from public knowledge sources (Azure Blob Storage and an optional web source) and uses a small Azure OpenAI model as the query planner. Microsoft Entra ID with managed identity and RBAC enforces permission-aware access underneath.</desc>
  <style>
    .ser{font-family:'Instrument Serif',Georgia,serif;}
    .sans{font-family:'Manrope','Segoe UI',system-ui,sans-serif;}
    .neu{fill:#ffffff;stroke:#d9d3c8;stroke-width:1.5;}
    .acc{fill:#e4f1f1;stroke:#1f8a8a;stroke-width:1.6;}
    .mut{fill:#6f685c;}
  </style>

  <rect x="6" y="6" width="788" height="588" rx="18" fill="#faf7f2" stroke="#d9d3c8"/>
  <text x="400" y="34" text-anchor="middle" class="ser" font-size="21" fill="#2a2a28">soikio-agentathon — Azure resource architecture</text>
  <text x="400" y="53" text-anchor="middle" class="sans mut" font-size="10.5">Claude agents · Foundry IQ · Azure AI Search · public knowledge sources</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6f685c"/></marker>
  </defs>

  <!-- AGENT SERVICE -->
  <rect x="34" y="70" width="520" height="86" rx="12" fill="none" stroke="#1f8a8a" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="48" y="88" class="sans" font-size="10.5" letter-spacing="0.8" fill="#0f4f4f">MICROSOFT FOUNDRY — AGENT SERVICE</text>
  <rect x="48" y="98" width="116" height="44" rx="8" class="acc"/><text x="106" y="125" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#0f4f4f">Bull</text>
  <rect x="174" y="98" width="116" height="44" rx="8" class="acc"/><text x="232" y="125" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#0f4f4f">Bear</text>
  <rect x="300" y="98" width="116" height="44" rx="8" class="acc"/><text x="358" y="125" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#0f4f4f">Caution</text>
  <rect x="426" y="98" width="116" height="44" rx="8" class="acc"/><text x="484" y="125" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#0f4f4f">CIO</text>

  <!-- CLAUDE (agent reasoning) -->
  <rect x="586" y="70" width="178" height="86" rx="10" class="neu"/>
  <text x="675" y="101" text-anchor="middle" class="sans" font-size="12.5" font-weight="700" fill="#2a2a28">Claude (Anthropic)</text>
  <text x="675" y="119" text-anchor="middle" class="sans mut" font-size="9.5">agent reasoning</text>
  <text x="675" y="135" text-anchor="middle" class="sans mut" font-size="9.5">Sonnet 4.6 · Opus (CIO)</text>
  <line x1="554" y1="113" x2="586" y2="113" stroke="#6f685c" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="570" y="106" text-anchor="middle" class="sans mut" font-size="8">reason</text>

  <!-- KNOWLEDGE BASE -->
  <line x1="300" y1="156" x2="300" y2="190" stroke="#6f685c" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="312" y="178" class="sans mut" font-size="8.5">query</text>
  <rect x="180" y="190" width="300" height="58" rx="11" class="acc"/>
  <text x="330" y="214" text-anchor="middle" class="sans" font-size="13.5" font-weight="700" fill="#0f4f4f">Foundry IQ — Knowledge Base</text>
  <text x="330" y="231" text-anchor="middle" class="sans" font-size="9.5" fill="#0f4f4f">agentic retrieval · permission-aware · citations</text>

  <!-- AZURE AI SEARCH -->
  <line x1="330" y1="248" x2="330" y2="282" stroke="#6f685c" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="180" y="282" width="300" height="58" rx="11" class="acc"/>
  <text x="330" y="306" text-anchor="middle" class="sans" font-size="13.5" font-weight="700" fill="#0f4f4f">Azure AI Search</text>
  <text x="330" y="323" text-anchor="middle" class="sans" font-size="9.5" fill="#0f4f4f">index · vector · hybrid · semantic rerank</text>

  <!-- AZURE OPENAI (mini) — query planner -->
  <rect x="586" y="282" width="178" height="58" rx="10" class="neu"/>
  <text x="675" y="306" text-anchor="middle" class="sans" font-size="12.5" font-weight="700" fill="#2a2a28">Azure OpenAI (mini)</text>
  <text x="675" y="323" text-anchor="middle" class="sans mut" font-size="9.5">Foundry IQ query planner</text>
  <line x1="586" y1="311" x2="482" y2="311" stroke="#6f685c" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="534" y="304" text-anchor="middle" class="sans mut" font-size="8">plans queries</text>

  <!-- KNOWLEDGE SOURCES -->
  <line x1="280" y1="340" x2="220" y2="384" stroke="#6f685c" stroke-width="1.3" marker-end="url(#ar)"/>
  <line x1="380" y1="340" x2="560" y2="384" stroke="#6f685c" stroke-width="1.3" marker-end="url(#ar)"/>
  <rect x="92" y="384" width="256" height="58" rx="10" class="neu"/>
  <text x="220" y="408" text-anchor="middle" class="sans" font-size="12.5" font-weight="700" fill="#2a2a28">Azure Blob Storage</text>
  <text x="220" y="425" text-anchor="middle" class="sans mut" font-size="9.5">public filings + docs · provenance noted</text>
  <rect x="452" y="384" width="256" height="58" rx="10" fill="#ffffff" stroke="#d9d3c8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="580" y="408" text-anchor="middle" class="sans" font-size="12.5" font-weight="700" fill="#2a2a28">Web knowledge source</text>
  <text x="580" y="425" text-anchor="middle" class="sans mut" font-size="9.5">optional · public web grounding</text>
  <text x="400" y="367" text-anchor="middle" class="sans mut" font-size="8.5">knowledge sources — index / retrieve</text>

  <!-- IDENTITY BAND -->
  <rect x="36" y="470" width="728" height="50" rx="10" fill="#f1ede5" stroke="#d9d3c8" stroke-width="1.4"/>
  <text x="400" y="491" text-anchor="middle" class="sans" font-size="12" font-weight="700" fill="#2a2a28">Microsoft Entra ID · managed identity · RBAC</text>
  <text x="400" y="507" text-anchor="middle" class="sans mut" font-size="9.5">permission-aware retrieval at query time · least-privilege roles · Purview sensitivity labels honoured</text>

