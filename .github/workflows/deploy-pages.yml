name: Deploy web to GitHub Pages

# Publishes the standalone frontend (web/) to GitHub Pages automatically — no human in the loop.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions". After that, every push deploys.

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web            # publish the web/ folder (index.html + sample-brief.json)
      - id: deployment
        uses: actions/deploy-pages@v4
