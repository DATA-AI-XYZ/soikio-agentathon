name: Deploy backend to Container App

# Ships the src/ red-team API as a new Container App revision on every push to main.
# Mirrors deploy-pages.yml (frontend) so backend + frontend both deploy from main.
#
# One-time setup (not done by this workflow):
#   1. Repo → Settings → Secrets and variables → Actions:
#        Secrets:   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#        Variables: AZURE_RESOURCE_GROUP   (the RG holding ca-soikio-prod-eus2)
#   2. On the Azure AD app / UAMI behind AZURE_CLIENT_ID, add a GitHub federated
#      credential (OIDC) for this repo + the main branch, and grant it:
#        - AcrPush on crsoikioprodeus2
#        - Contributor on ca-soikio-prod-eus2 (or its resource group)
#   3. Container App runtime config (env vars, ingress, managed identity, RBAC to
#      Key Vault + Foundry IQ/Search) is one-time infra — see backend deploy notes.
#      This workflow only builds + rolls a new image; it doesn't touch that config.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prompts/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'requirements.lock.txt'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write      # OIDC token for azure/login (keyless)
  contents: read

env:
  ACR: crsoikioprodeus2
  IMAGE: soikio-api
  APP: ca-soikio-prod-eus2

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC, keyless)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR
        run: az acr build -r "$ACR" -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: Roll new Container App revision
        run: |
          az containerapp update \
            -n "$APP" \
            -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "$ACR.azurecr.io/$IMAGE:${{ github.sha }}"

      - name: Show ingress URL
        run: |
          az containerapp show -n "$APP" -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv
